<!doctype html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Vlajkový kvíz</title>
    <style>
        body { font-family: system-ui, Arial; margin: 0; padding: 16px; }
        .top {
          position: sticky;
          top: 0;
          z-index: 100;

          display: flex;
          gap: 12px;
          align-items: center;
          flex-wrap: wrap;

          background: white;
          padding: 12px;
          border-bottom: 1px solid #ddd;
        }
        .grid {
          margin-top: 24px;
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
          gap: 12px;
        }
        .card {
          border: 1px solid #ddd;
          border-radius: 12px;
          padding: 10px;
          display: flex;
          flex-direction: column;
          gap: 8px;
          background: #fff;
        }
        .flag {
          width: 100%;
          height: 110px;
          object-fit: contain;
          background: #f6f6f6;
          border-radius: 10px;
          border: 1px solid #eee;
        }
        body {
          font-family: system-ui, Arial;
          margin: 0;
          padding: 16px;
          max-width: 1400px;
          margin-left: auto;
          margin-right: auto;
        }
        input {
          padding: 10px;
          border-radius: 10px;
          border: 1px solid #ccc;
          font-size: 14px;
        }
        .solved input {
          border-color: #2ecc71;
          outline: none;
          background: #f2fff6;
        }
        .solved .label {
          color: #2ecc71;
          font-weight: 600;
        }
        .label { font-size: 12px; color: #666; }
    </style>
</head>
<body>

<div class="top">
    <button id="startBtn">Štart</button>
    <button id="reshuffleBtn" disabled>Reset</button>

    <div>Čas: <span id="time">15:00</span></div>
    <div>Hotovo: <span id="done">0</span> / <span id="total">0</span></div>
</div>

<div id="grid" class="grid"></div>

<script>
    let running = false;
    let timeLeft = 25 * 60; // sekundy
    let timerId = null;
    let countries = [];
    let done = 0;

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    function norm(s) {
      return (s ?? "")
        .trim()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, " ");
    }

    function isCorrect(user, expected) {
      return norm(user) === norm(expected);
    }

    function focusNextFrom(startIndex) {
      const inputs = Array.from(document.querySelectorAll("input[data-index]"));
      for (let k = startIndex + 1; k < inputs.length; k++) {
        if (!inputs[k].disabled) {
          inputs[k].focus();
          return;
        }
      }
      const first = inputs.find(inp => !inp.disabled);
      if (first) first.focus();
    }

    function render() {
      const grid = document.getElementById("grid");
      grid.innerHTML = "";

      document.getElementById("total").textContent = countries.length;
      document.getElementById("done").textContent = done;

      countries.forEach((c, idx) => {
        const card = document.createElement("div");
        card.className = "card";
        card.dataset.index = idx;

        const img = document.createElement("img");
        img.className = "flag";
        img.alt = "Vlajka";
        img.src = "/flags/" + c.flag  + ".png";

        const label = document.createElement("div");
        label.className = "label";
        label.textContent = "Napíš názov štátu";

        const input = document.createElement("input");
        input.setAttribute("data-index", String(idx));

        input.addEventListener("input", () => {
          if (!running) return;
          if (input.disabled) return;

          if (isCorrect(input.value, c.name)) {
            input.value = c.name;
            input.disabled = true;
            card.classList.add("solved");
            label.textContent = "Správne ✓";

            done++;
            document.getElementById("done").textContent = done;

            focusNextFrom(idx);
          }
        });

        card.appendChild(img);
        card.appendChild(label);
        card.appendChild(input);
        grid.appendChild(card);
      });

      focusNextFrom(-1);
    }

    async function load() {
      const res = await fetch("/api/countries");
      countries = await res.json();

      shuffle(countries);
      done = 0;
      setTimeUI();
      render();
    }

    function startGame() {
      if (running) return;

      running = true;
      timeLeft = 15 * 60;
      setTimeUI();

      document.getElementById("startBtn").disabled = true;
      document.getElementById("reshuffleBtn").disabled = false;

      // odomkni inputy
      document.querySelectorAll("input[data-index]").forEach(inp => {
        if (!inp.closest(".solved")) inp.disabled = false;
      });

      focusNextFrom(-1);

      timerId = setInterval(() => {
        timeLeft--;
        setTimeUI();

        if (timeLeft <= 0) {
          timeLeft = 0;
          setTimeUI();
          stopGame();
        }
      }, 1000);
    }

    function formatTime(sec) {
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
    }

    function setTimeUI() {
      document.getElementById("time").textContent = formatTime(timeLeft);
    }

    function stopGame() {
      running = false;

      if (timerId) {
        clearInterval(timerId);
        timerId = null;
      }

      const inputs = document.querySelectorAll("input[data-index]");

      inputs.forEach(inp => {
        const idx = Number(inp.dataset.index);
        const country = countries[idx];
        const card = inp.closest(".card");
        const label = card.querySelector(".label");

        if (!inp.disabled) {
          // hráč neodpovedal správne
          inp.value = country.name;
          inp.disabled = true;

          label.textContent = "Správna odpoveď";
          label.style.color = "#e74c3c";
        }
      });

      document.getElementById("startBtn").disabled = false;
      document.getElementById("reshuffleBtn").disabled = false;
    }

    document.getElementById("startBtn").addEventListener("click", startGame);
    document.getElementById("reshuffleBtn").addEventListener("click", () => {
      // reset hry do "nebeží" stavu
      if (timerId) clearInterval(timerId);
      timerId = null;
      running = false;
      timeLeft = 15 * 60;
      document.getElementById("startBtn").disabled = false;
      document.getElementById("reshuffleBtn").disabled = true;
      load();
    });

    // inicializácia po načítaní stránky
    document.getElementById("reshuffleBtn").disabled = true;
    load();
</script>

</body>
</html>
